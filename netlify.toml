[build]
  base    = "consumer-app"
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NETLIFY = "true"

[[redirects]]
  from   = "/css/*"
  to     = "/css/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
